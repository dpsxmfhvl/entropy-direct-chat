<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entropy</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            /* 배경 설정 */
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), url('Entropy.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Inter', -apple-system, sans-serif;
        }

        /* 제목 스타일 */
        h1 {
            font-size: clamp(3rem, 8vw, 5rem);
            letter-spacing: 15px;
            text-transform: uppercase;
            font-weight: 900;
            margin: 0 0 30px 0;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
            animation: fadeIn 1.5s ease-out;
        }

        /* 챗방 영역 스타일링 */
        .chat-wrapper {
            width: 90%;
            max-width: 900px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            animation: fadeIn 2s ease-out;
        }

        /* Minnit Chat 하단 링크 제거 (선택사항) */
        .powered-by-minnit {
            display: none !important;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <h1>ENTROPY</h1>

    <div class="chat-wrapper">
        <!-- Minnit Chat 임베드 코드 -->
        <script src="https://minnit.chat/js/embed.js?c=1772345192" defer></script>
        <span class="minnit-chat-sembed" 
              data-chatname="https://organizations.minnit.chat/482767668376267/c/Main?embed" 
              data-style="width:100%; height:550px; max-height:80vh;" 
              data-version="1.55">Chat</span>
    </div>

</body>
</html>

</body>
</html>
