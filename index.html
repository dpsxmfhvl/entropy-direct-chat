<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entropy</title>
    <style>
        /* 기본 배경 설정 */
        body {
            margin: 0;
            padding: 0;
            background-color: #000; /* 검정 배경 */
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        /* 간지나는 제목 스타일 */
        h1 {
            font-size: 5rem;
            letter-spacing: 15px;
            text-transform: uppercase;
            font-weight: 900;
            margin-bottom: 30px;
            background: linear-gradient(to bottom, #fff 30%, #444 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 10px 20px rgba(255,255,255,0.1);
            animation: fadeIn 2s ease-in-out;
        }

        /* 챗방 임베드 컨테이너 */
        .chat-container {
            width: 90%;
            max-width: 800px;
            height: 500px;
            border: 1px solid #333;
            border-radius: 12px;
            overflow: hidden;
            background: #111;
            box-shadow: 0 0 30px rgba(255,255,255,0.05);
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* 간단한 등장 애니메이션 */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <h1>ENTROPY</h1>

    <div class="chat-container">
        <!-- 사용하시는 챗방 서비스의 임베드 코드를 여기에 넣으세요 -->
        <!-- 예시: Discord Widget, Cbox, Chatroll 등 -->
        <iframe src="여기에_챗방_주소를_넣으세요"></iframe>
    </div>

</body>
</html>
